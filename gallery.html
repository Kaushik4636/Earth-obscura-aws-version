        :root {
            --accent: #A100FF;
            --bg: #050505;
            --border: rgba(255,255,255,0.1);
            --glass: rgba(255, 255, 255, 0.03);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #fff;
            line-height: 1.6;
        }

        /* --- NAVIGATION (Preserved from your code) --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-weight: 900; font-size: 1.5rem; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            transition: 0.3s;
        }
        .nav-links a:hover { opacity: 1; color: var(--accent); }

        .dropdown { position: relative; }
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%; left: 0;
            background: #111;
            min-width: 200px;
            border: 1px solid var(--border);
            padding: 10px 0;
            z-index: 1001;
        }
        .dropdown:hover .dropdown-content { display: flex; flex-direction: column; }
        .dropdown-content a { padding: 10px 20px; margin: 0; text-transform: none; }

        /* --- GALLERY HEADER --- */
        .gallery-header {
            padding: 100px 5% 50px;
            text-align: center;
        }
        .gallery-header p { color: var(--accent); letter-spacing: 8px; text-transform: uppercase; font-size: 0.8rem; font-weight: 700; }
        .gallery-header h1 { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900; margin-top: 15px; letter-spacing: -2px; }

        /* --- UNIFORM GRID SYSTEM --- */
        .gallery-container {
            padding: 0 5% 100px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .gallery-item {
            background: var(--glass);
            border: 1px solid var(--border);
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden;
            padding-bottom: 20px;
        }

        .gallery-item:hover {
            border-color: var(--accent);
            transform: translateY(-8px);
        }

        .img-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1; /* Makes all images perfect squares */
            overflow: hidden;
            margin-bottom: 15px;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: 0.8s;
        }

        .gallery-item:hover img {
            filter: grayscale(0%);
            transform: scale(1.1);
        }

        .info-box {
            padding: 0 20px;
        }

        .info-box span {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
        }

        .info-box h3 {
            font-size: 1rem;
            font-weight: 400;
            color: #fff;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 60px;
            background: #000;
            border-top: 1px solid var(--border);
        }
        footer p { font-size: 0.8rem; letter-spacing: 2px; opacity: 0.7; }
    </style>
</head>
